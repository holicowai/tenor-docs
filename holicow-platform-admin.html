    .admin-table thead th { color:var(--ink-800); font-size:11px; font-weight:700; letter-spacing:0.4px; text-transform:uppercase; font-family:'Montserrat',-apple-system,sans-serif; padding:0.75rem 1.25rem; text-align:left; }
    .admin-table tbody td { padding:0.75rem 1.25rem; font-size:0.875rem; color:var(--text-default); border-bottom:1px solid var(--ink-200); }

      const EMPTY_SCREEN_MAP = Object.fromEntries(
        SCREEN_GROUPS.flatMap(g => g.screens.map(s => [s.key, false]))
      );
      const [opsScreens, setOpsScreens] = React.useState(SCREEN_CONFIG_SEED[selectedClient] || EMPTY_SCREEN_MAP);

        setSelectedClient(clientId);
        setOpsScreens(SCREEN_CONFIG_SEED[clientId] || EMPTY_SCREEN_MAP);

          {/* TOPBAR */}
          <div className="h-14 bg-white px-6 flex items-center justify-between" style={{borderBottom:'1px solid var(--border-default)'}}>
            <div className="flex items-center gap-3">
              <span className="text-xs font-semibold uppercase tracking-widest" style={{color:'var(--ink-400)',fontFamily:T.fontDisplay}}>Internal Ops</span>
            </div>
            <div className="flex items-center gap-4">
              <div className="flex items-center gap-2 px-3 py-1.5 bg-green-50 border border-green-200 rounded-full">
                <div className="w-2 h-2 rounded-full animate-pulse" style={{background:'var(--success)'}} />
                <span className="text-xs font-semibold text-green-700">All Systems Operational</span>
              </div>
              <div className="text-right">
                <p className="text-sm font-semibold text-gray-800">{ADMIN_USER.name}</p>
                <p className="text-xs text-gray-500">{ADMIN_USER.title}</p>
              </div>
              <div className="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm" style={{background:'var(--purple-faint)',color:'var(--purple)',fontFamily:T.fontDisplay}}>{ADMIN_USER.initials}</div>
            </div>
          </div>

          {/* MAIN LAYOUT */}
          <div className="flex flex-1 overflow-hidden">
            {/* SIDEBAR */}
            <div className="w-60 text-white flex flex-col" style={{background:'var(--ink-900)'}}>
              {/* Logo Area — white background so HCWordmark renders in full colour */}
              <div className="px-5 py-4" style={{background:'var(--surface-card)',borderBottom:'1px solid var(--border-default)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <div style={{background:'var(--purple)',borderRadius:4,padding:'2px 7px',display:'inline-flex',alignSelf:'flex-start'}}>
                    <span style={{fontFamily:T.fontDisplay,fontSize:11,fontWeight:700,letterSpacing:'0.1em',color:'var(--surface-card)'}}>TENOR</span>
                  </div>
                </div>
                <HCWordmark h={24} />
                <div style={{marginTop:5,fontSize:11,color:'var(--ink-600)',fontFamily:T.fontBody,letterSpacing:'0.01em'}}>Platform Admin</div>
              </div>

              {/* Nav Items */}
              <nav className="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
                {navGroups.map(group => (
                  <div key={group.label} className="mb-4">
                    <div className="px-4 py-1 text-xs font-semibold uppercase tracking-widest mb-1" style={{color:'rgba(255,255,255,0.50)',fontFamily:T.fontDisplay,letterSpacing:'0.08em'}}>{group.label}</div>
                    {group.items.map(item => (
                      <button
                        key={item.id}
                        onClick={() => setActiveScreen(item.id)}
                        className={`sidebar-nav-item w-full text-left px-4 py-2.5 rounded-lg text-sm transition ${activeScreen === item.id ? 'active' : ''}`}
                      >
                        {item.label}
                      </button>
                    ))}
                  </div>
                ))}
              </nav>

              {/* Footer */}
              <div className="px-6 py-4 text-xs" style={{borderTop:'1px solid rgba(255,255,255,0.07)',color:'rgba(255,255,255,0.30)'}}>
                Platform Admin v1.7
              </div>
            </div>

            {/* MAIN CONTENT */}
            <div className="flex-1 flex flex-col overflow-hidden">
              {/* Header */}
              <div className="bg-white border-b border-gray-200 px-8 py-6">
                <h1 className="text-2xl font-bold text-gray-900" style={{fontFamily:T.fontDisplay}}>{currentTitle.title}</h1>
                <p className="text-sm mt-1" style={{color:'var(--text-muted)'}}>{currentTitle.subtitle}</p>
              </div>

              {/* Content */}
              <div className="flex-1 overflow-auto px-8 py-6">
                {activeScreen === 'users'          && <UserManagement />}
                {activeScreen === 'integrations'   && <IntegrationMonitor />}
                {activeScreen === 'features'       && <FeatureFlags />}
                {activeScreen === 'screen-config'  && <ScreenConfig />}
                {activeScreen === 'ai-performance' && <AIPerformance />}
                {activeScreen === 'audit-log'      && <AuditLog />}
                {activeScreen === 'security-access'&& <SecurityAccess />}
              </div>
            </div>
          </div>
        </div>
      );
    }


    const tenantSecurity = [
      { clientId:'proviso', mfa:'enforced', sessions:4, failedLogins:0, ipAllowlist:false, lastAudit:'Mar 20, 2026', status:'green' },
      { clientId:'lyons',   mfa:'optional', sessions:1, failedLogins:2, ipAllowlist:false, lastAudit:'Mar 10, 2026', status:'amber' },
      { clientId:'niles',   mfa:'none',     sessions:0, failedLogins:0, ipAllowlist:false, lastAudit:'—', status:'red' },
    ];

    const apiKeys = [
      { id:'k1', clientId:'proviso', label:'InfoLink CSV Parser (email ingestion)', created:'Feb 1, 2026', lastUsed:'Today 6:02 AM', masked:'sk-hc-prov-****-****-3a7f' },
      { id:'k2', clientId:'proviso', label:'Anthropic AI API Key', created:'Feb 1, 2026', lastUsed:'Today 9:14 AM', masked:'sk-ant-****-****-api2' },
      { id:'k3', clientId:'lyons',   label:'InfoLink CSV Parser (email ingestion)', created:'Mar 15, 2026', lastUsed:'Mar 20, 2026', masked:'sk-hc-lyon-****-****-7e1d' },
    ];

    const sessionConfig = [
      { label:'Session timeout (idle)',    value:'8 hours',  configurable:true },
      { label:'Max concurrent sessions',  value:'5',         configurable:true },
      { label:'Remember device (days)',   value:'30 days',   configurable:true },
      { label:'MFA grace period',         value:'0 minutes', configurable:false },
      { label:'Password rotation',        value:'90 days',   configurable:true },
      { label:'Failed login lockout',     value:'5 attempts',configurable:true },
    ];

    // ============ COMPONENT: SecurityAccess ============
    function SecurityAccess() {
      const [showKey, setShowKey] = React.useState({});
      const toggleKey = (id) => setShowKey(p => ({ ...p, [id]: !p[id] }));

      const mfaEnforced    = tenantSecurity.filter(t => t.mfa === 'enforced').length;
      const totalSessions  = tenantSecurity.reduce((sum, t) => sum + t.sessions, 0);
      const totalFailed    = tenantSecurity.reduce((sum, t) => sum + t.failedLogins, 0);
      const failedClient   = tenantSecurity.find(t => t.failedLogins > 0);
      const failedSub      = failedClient
        ? (CLIENTS.find(c => c.id === failedClient.clientId)?.shortName ?? failedClient.clientId) + ' — investigating'
        : 'none in 24h';
      const attentionCount = tenantSecurity.filter(t => t.status !== 'green').length;

      return (
        <div className="space-y-6">
          {/* Summary bar */}
          <div className="grid grid-cols-4 gap-4">
            {[
              { label:'MFA Enforced', value:`${mfaEnforced} / ${tenantSecurity.length}`, sub:'clients', color: mfaEnforced === tenantSecurity.length ? 'var(--success)' : 'var(--warning)' },
              { label:'Active Sessions', value:String(totalSessions), sub:'across all tenants', color:'var(--brand-indigo)' },
              { label:'Failed Logins (24h)', value:String(totalFailed), sub: failedSub, color: totalFailed > 0 ? 'var(--danger)' : 'var(--success)' },
              { label:'API Keys', value:String(apiKeys.length), sub:'all active', color:'var(--success)' },
            ].map(m => (
              <div key={m.label} className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                <div className="text-xs text-gray-500 font-medium mb-1">{m.label}</div>
                <div className="text-2xl font-bold" style={{color:m.color}}>{m.value}</div>
                <div className="text-xs text-gray-400 mt-1">{m.sub}</div>
              </div>
            ))}
          </div>

          {/* Per-tenant MFA + session status */}
          <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
              <h2 className="admin-section-title">Tenant Security Status</h2>
              <span className="text-xs font-medium" style={{color: attentionCount > 0 ? 'var(--danger)' : 'var(--success)'}}>{attentionCount > 0 ? `${attentionCount} ${attentionCount === 1 ? 'tenant needs' : 'tenants need'} attention` : 'All tenants secure'}</span>
            </div>
            <table className="admin-table w-full">
              <thead>
                <tr>
                  {['Client','MFA Status','Active Sessions','Failed Logins (24h)','IP Allowlist','Last Audit',''].map(h => (
                    <th key={h}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {tenantSecurity.map(t => (
                  <tr key={t.clientId}>
                    <td className="font-semibold">{CLIENTS.find(c=>c.id===t.clientId)?.name ?? t.clientId}</td>
                    <td className="px-6 py-4">
                      <span className={t.mfa === 'enforced' ? 'badge badge-green' : t.mfa === 'optional' ? 'badge badge-amber' : 'badge badge-red'}>{t.mfa.charAt(0).toUpperCase()+t.mfa.slice(1)}</span>
                    </td>
                    <td>{t.sessions}</td>
                    <td className="px-6 py-4">
                      <span style={{color: t.failedLogins > 0 ? 'var(--danger)' : 'var(--text-muted)', fontWeight: t.failedLogins > 0 ? 600 : 400}}>{t.failedLogins}</span>
                    </td>
                    <td className="px-6 py-4">
                      <span className={t.ipAllowlist ? 'badge badge-green' : 'badge badge-gray'}>{t.ipAllowlist ? 'Enabled' : 'Off'}</span>
                    </td>
                    <td style={{color:'var(--text-muted)'}}>{t.lastAudit}</td>
                    <td className="px-6 py-4">
                      <button className="admin-btn-ghost text-xs px-2 py-1">Configure \u2192</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="grid grid-cols-2 gap-6">
            {/* Session configuration */}
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
              <div className="px-6 py-4 border-b border-gray-100">
                <h2 className="admin-section-title">Session Configuration</h2>
                <p className="text-xs text-gray-400 mt-0.5">Platform-wide defaults — overridable per tenant</p>
              </div>
              <div className="divide-y divide-gray-50">
                {sessionConfig.map(s => (
                  <div key={s.label} className="px-6 py-3 flex items-center justify-between">
                    <span className="text-sm text-gray-600">{s.label}</span>
                    <div className="flex items-center gap-3">
                      <span className="text-sm font-semibold text-gray-800">{s.value}</span>
                      {s.configurable && <button className="admin-btn-ghost text-xs px-2 py-1">Edit</button>}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* API key management */}
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
              <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                <div>
                  <h2 className="admin-section-title">API Keys & Credentials</h2>
                  <p className="text-xs text-gray-400 mt-0.5">Integration tokens — masked by default</p>
                </div>
                <button className="admin-btn-primary text-xs px-3 py-1.5">+ Generate Key</button>
              </div>
              <div className="divide-y divide-gray-50">
                {apiKeys.map(k => (
                  <div key={k.id} className="px-6 py-3">
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-sm font-semibold text-gray-800">{k.label}</span>
                      <div className="flex gap-2">
                        <button onClick={() => toggleKey(k.id)} className="admin-btn-ghost text-xs px-2 py-1">{showKey[k.id] ? 'Hide' : 'Reveal'}</button>
                        <button className="admin-btn-ghost-danger text-xs px-2 py-1">Revoke</button>
                      </div>
                    </div>
                    <div className="text-xs text-gray-400">{CLIENTS.find(c=>c.id===k.clientId)?.shortName ?? k.clientId} \u00b7 Last used: {k.lastUsed}</div>
                    <div className="text-xs font-mono rounded px-2 py-1 mt-1" style={{background:'var(--ink-100)',color:'var(--ink-800)'}}>
                      {showKey[k.id] ? k.masked : '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022'}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* AI Guardrail kill switches */}
          <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <div className="px-6 py-4 border-b border-gray-100">
              <h2 className="admin-section-title">AI Guardrail Controls</h2>
              <p className="text-xs text-gray-400 mt-0.5">Emergency kill switches \u2014 take effect immediately without a code deploy</p>
            </div>
            <div className="grid grid-cols-3 gap-0 divide-x divide-gray-100">
              {[
                { label:'Ask Tenor (All Tenants)', desc:'Natural language Q&A', status:true, risk:'Low' },
                { label:'AI Investment Recs', desc:'Advisory recommendations engine', status:true, risk:'Medium' },
                { label:'Statement Auto-Parse', desc:'AI PDF parsing for investment custodian statements', status:true, risk:'Low' },
                { label:'AI Board Report Narrative (V2)', desc:'Draft generation for board reports', status:false, risk:'Medium' },
                { label:'Prompt Injection Filter', desc:'Block malicious query patterns', status:true, risk:'Critical \u2014 keep ON' },
              ].map(g => (
                <div key={g.label} className="px-6 py-4">
                  <div className="flex items-start justify-between mb-2">
                    <span className="text-sm font-semibold text-gray-800">{g.label}</span>
                    <span className={'ml-2 flex-shrink-0 ' + (g.status ? 'badge badge-green' : 'badge badge-gray')}>{g.status ? 'ON' : 'OFF'}</span>
                  </div>
                  <div className="text-xs text-gray-400 mb-2">{g.desc}</div>
                  <div className="text-xs text-gray-400">Risk: <span style={{color: g.risk.includes('Critical') ? 'var(--danger)' : g.risk === 'Medium' ? 'var(--warning)' : 'var(--success)', fontWeight: g.risk.includes('Critical') || g.risk === 'Medium' ? 600 : 400}}>{g.risk}</span></div>
                  <button
                    className={'mt-2 text-xs px-3 py-1 rounded-lg font-semibold transition-colors' + (g.risk.includes('Critical') ? ' bg-gray-100 text-gray-300 cursor-not-allowed' : '')}
                    style={g.risk.includes('Critical') ? {} : g.status ? {background:'var(--danger-bg)',color:'var(--danger)'} : {background:'var(--success-bg)',color:'var(--success)'}}
                    disabled={g.risk.includes('Critical')}>
                    {g.risk.includes('Critical') ? 'Locked' : g.status ? 'Disable' : 'Enable'}
                  </button>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ============ RENDER ============
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PlatformAdmin />);
  </script>
</body>
</html>
